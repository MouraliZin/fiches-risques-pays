name: Scraping Fiches Risques Pays

on:
  schedule:
    - cron: "0 1 * * *"      # chaque nuit à 02h00 (Paris) — 01h00 UTC
  workflow_dispatch:          # bouton "Run workflow" pour déclencher à la main

# Empêche deux exécutions simultanées (ex : cron + lancement manuel)
concurrency:
  group: scraping-fiches
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30       # filet de sécurité : coupe un run bloqué
    permissions:
      contents: write         # nécessaire pour que le bot puisse committer

    steps:
      # 1. Récupère le dépôt (v6 = support natif Node.js 24)
      - name: Checkout du dépôt
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Installe Python (v6 = support natif Node.js 24)
      - name: Installation de Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # 3. Prépare les dossiers de sortie (data.json + cartes locales)
      - name: Préparation des dossiers
        run: mkdir -p public public/maps

      # 4. Lance le scraping
      - name: Exécution du scraper
        run: python scripts/scraper.py

      # 5. Committe les résultats s'il y a des changements
      - name: Commit et push des données
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json public/maps
          if git diff --staged --quiet; then
            echo "Aucun changement détecté — rien à committer."
          else
            git commit -m "🔄 Mise à jour fiches risques pays — $(date +'%d/%m/%Y %H:%M')"
            git push
            echo "✅ Données mises à jour et poussées."
          fi
