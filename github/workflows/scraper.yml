name: Scraping Fiches Risques Pays

on:
  # Tourne automatiquement chaque nuit à 02h00 (heure de Paris)
  schedule:
    - cron: "0 1 * * *"
  # Permet aussi de le lancer manuellement depuis GitHub
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lancer le scraper
        run: python scripts/scraper.py

      - name: Sauvegarder les données sur GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          git diff --staged --quiet || git commit -m "🔄 Mise à jour données pays $(date +'%d/%m/%Y')"
          git push
